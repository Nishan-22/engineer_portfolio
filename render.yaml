services:
  - type: web
    name: portfolio
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn portfolio.wsgi --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false # You will paste your Neon.tech URL in the dashboard
      - key: ALLOWED_HOSTS
        value: "*"
