{% extends "core/base.html" %}
{% block content %}

<div class="container-page section-spacing">
    <div class="reveal">
        <div class="section-label">Portfolio</div>
        <h1 class="font-heading text-5xl md:text-6xl text-white mb-12">Projects</h1>
    </div>

    <div class="grid md:grid-cols-2 gap-10 lg:gap-12">
        {% for project in projects %}
        <article class="group reveal" style="transition-delay: {{ forloop.counter0|add:1 }}00ms">
            <div class="aspect-[16/10] overflow-hidden rounded-2xl border border-white/5 relative mb-6">
                <img src="{{ project.image.url }}" alt="{{ project.title }}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-8">
                    <a href="{% url 'project_detail' project.id %}" class="btn-primary py-3 px-6 text-xs">View Case Study</a>
                </div>
            </div>
            <div class="px-2">
                <p class="text-[var(--accent)] text-[10px] font-bold uppercase tracking-[0.2em] mb-3">{{ project.category.name|default:"General Engineering" }}</p>
                <h2 class="font-heading text-2xl text-white mb-3 group-hover:text-[var(--accent)] transition-colors">
                    <a href="{% url 'project_detail' project.id %}">{{ project.title }}</a>
                </h2>
                <p class="text-white/50 leading-relaxed line-clamp-2 mb-6">{{ project.description }}</p>
                <a href="{% url 'project_detail' project.id %}" class="inline-flex items-center gap-2 text-white/40 text-xs font-bold uppercase tracking-widest group-hover:text-white transition-colors">
                    Detailed View 
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                </a>
            </div>
        </article>
        {% endfor %}
    </div>
</div>

<script>
    function reveal() {
        var reveals = document.querySelectorAll(".reveal");
        for (var i = 0; i < reveals.length; i++) {
            var windowHeight = window.innerHeight;
            var elementTop = reveals[i].getBoundingClientRect().top;
            var elementVisible = 100;
            if (elementTop < windowHeight - elementVisible) {
                reveals[i].classList.add("active");
            }
        }
    }
    window.addEventListener("scroll", reveal);
    reveal();
</script>

{% endblock %}
